name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'clean-architecture-visualizer/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'clean-architecture-visualizer/**'
      - '.github/workflows/ci.yml'

jobs:
  jest-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./clean-architecture-visualizer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './clean-architecture-visualizer/package-lock.json'

      - name: Install dependencies
        run: npm ci
      
      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run jest
        run: npm test
